<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קריאה בעברית</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Confetti library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="splash-screen" class="screen active">
        <div class="logo">
            <h1>משחק קריאה</h1>
            <p>בואו נלמד עברית!</p>
        </div>
        <button id="start-game-btn">התחל משחק</button>
    </div>

    <div id="game-screen" class="screen">
        <button id="toggle-mode-btn">⚙️</button>
        <div id="word-container">
            <h2 id="word"></h2>
        </div>
        <div id="speech-feedback-container">
            <p id="speech-feedback-text"></p>
        </div>
        <button id="record-btn">🎤 הקלט</button>
        <div id="options-container">
            <div class="option" id="option1"></div>
            <div class="option" id="option2"></div>
            <div class="option" id="option3"></div>
        </div>
        <div id="feedback-container">
            <p id="feedback-text"></p>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="password-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h2>הגדרות</h2>
            <div id="password-prompt-container">
                <hr>
                <p>כדי לגשת להגדרות, יש להזין סיסמה:</p>
                <div id="password-input-container">
                    <input type="number" class="password-digit" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="password-digit" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="password-digit" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="password-digit" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                </div>
                <p id="password-feedback" class="feedback"></p>
            </div>
            <div id="settings-actions-container" class="hidden">
                <div class="setting-row">
                    <label>שניות להקלטה:</label>
                    <div class="stepper">
                        <button id="stepper-minus" class="stepper-btn" aria-label="הפחת שנייה">-</button>
                        <span id="timeout-display">6</span>
                        <button id="stepper-plus" class="stepper-btn" aria-label="הוסף שנייה">+</button>
                    </div>
                </div>
                 <button id="save-timeout-btn" class="settings-btn">שמור טיימאווט</button>
                 <button id="change-mode-btn" class="settings-btn">שנה מצב משחק</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <div id="log-container"></div>
</body>
</html>
